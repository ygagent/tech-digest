<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}}</title>
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <style>
    :root {
      --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f2f5;
      --border: #e8ecf1; --border-hover: #c5cdd8;
      --text: #1a1d21; --text-secondary: #3d4550; --text-muted: #8c95a1;
      --accent: #2d9f6f; --accent-light: #e8f5ef; --accent-hover: #248a5e;
      --accent-text: #ffffff;
      --purple: #7c5cbf; --purple-light: #f3effc;
      --orange: #e58e26; --orange-light: #fef5e7;
      --blue: #3a82f7; --blue-light: #eef4fe;
      --red: #e74c3c; --red-light: #fdecea;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
      --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.8; font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 32px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 200; box-shadow: var(--shadow-sm);
    }
    .topbar-brand {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .topbar-brand svg { width: 28px; height: 28px; }
    .topbar-nav { display: flex; gap: 4px; margin-left: 24px; }
    .topbar-nav a {
      padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500;
      color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
    }
    .topbar-nav a:hover { background: var(--surface2); color: var(--text); }
    .topbar-nav a.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .page { display: flex; max-width: 1100px; margin: 0 auto; padding: 24px 24px 0; gap: 24px; }
    .toc {
      width: 220px; flex-shrink: 0;
      position: sticky; top: 80px; height: calc(100vh - 104px); overflow-y: auto;
      background: var(--surface); border-radius: var(--radius); padding: 20px 16px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    }
    .toc-title {
      font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; padding-left: 12px;
    }
    .toc a {
      display: block; padding: 7px 12px; margin-bottom: 2px;
      font-size: 0.82rem; color: var(--text-muted); text-decoration: none;
      border-radius: var(--radius-xs); transition: all 0.15s; font-weight: 500;
    }
    .toc a:hover { color: var(--accent); background: var(--accent-light); }
    .toc a.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }
    .toc-mobile {
      display: none; position: sticky; top: 57px; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; box-shadow: var(--shadow-sm);
    }
    .toc-mobile summary { cursor: pointer; font-size: 0.85rem; color: var(--accent); font-weight: 600; list-style: none; }
    .toc-mobile summary::-webkit-details-marker { display: none; }
    .toc-mobile .toc-dropdown {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px; margin-top: 8px; max-height: 60vh; overflow-y: auto; box-shadow: var(--shadow-md);
    }
    .toc-mobile .toc-dropdown a {
      display: block; padding: 8px 12px; font-size: 0.88rem;
      color: var(--text-secondary); text-decoration: none; border-radius: var(--radius-xs);
    }
    .toc-mobile .toc-dropdown a:hover { color: var(--accent); background: var(--accent-light); }
    @media (max-width: 860px) {
      .toc { display: none; }
      .toc-mobile { display: block; }
      .topbar-nav { display: none; }
      .page { flex-direction: column; padding: 16px 12px 0; gap: 16px; }
      .container { padding: 20px 16px 60px; }
      .table-wrapper { margin: 12px -16px; padding: 0 16px; }
      .action-table { min-width: 560px; font-size: 0.82rem; }
      .action-table th, .action-table td { padding: 8px 10px; }
      .guest-meta { flex-wrap: wrap; gap: 12px; }
      .video-link { margin-top: 4px; }
      h1 { font-size: 1.3rem; }
    }
    .container {
      flex: 1; min-width: 0;
      background: var(--surface); border-radius: var(--radius);
      padding: 36px 40px 60px; box-shadow: var(--shadow-sm);
      border: 1px solid var(--border); margin-bottom: 40px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      margin-bottom: 28px; font-weight: 500; transition: color 0.15s;
    }
    .back:hover { color: var(--accent); }
    .guest-meta {
      background: var(--surface2); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 16px;
    }
    .guest-avatar {
      width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent-light); flex-shrink: 0;
    }
    .guest-info { flex: 1; }
    .guest-name { font-weight: 700; font-size: 1rem; color: var(--text); }
    .guest-title-text { font-size: 0.85rem; color: var(--text-muted); }
    .video-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--red); color: white; padding: 8px 16px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none; transition: opacity 0.2s;
    }
    .video-link:hover { opacity: 0.85; color: white; text-decoration: none; }
    .audio-player-card {
      background: linear-gradient(135deg, var(--accent-light) 0%, #f0faf5 100%);
      border: 1px solid var(--accent); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 28px;
      display: flex; align-items: center; gap: 16px;
    }
    .audio-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem;
    }
    .audio-info { flex: 1; min-width: 0; }
    .audio-label { font-size: 0.82rem; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
    .audio-player-card audio {
      width: 100%; height: 36px; border-radius: 18px;
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; line-height: 1.35; }
    .meta-tier {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; vertical-align: middle;
      margin-left: 8px; letter-spacing: 0.03em;
    }
    .meta-tier-featured {
      background: linear-gradient(135deg, #f5a623 0%, #e8890c 100%);
      color: #fff;
    }
    .meta-tier-recommended { background: var(--accent); color: #fff; }
    .meta { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
    .tags { margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-block; font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
      background: var(--accent-light); color: var(--accent); font-weight: 600;
    }
    h2 {
      font-size: 1.2rem; font-weight: 700; margin: 40px 0 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-light); scroll-margin-top: 90px;
    }
    h3 { font-size: 1.05rem; font-weight: 600; margin: 26px 0 8px; color: var(--text); }
    h4 { font-size: 0.95rem; font-weight: 600; margin: 18px 0 6px; color: var(--text-secondary); }
    p { margin-bottom: 14px; color: var(--text-secondary); }
    ul, ol { margin: 10px 0 14px 20px; color: var(--text-secondary); }
    li { margin-bottom: 6px; }
    a { color: var(--accent); text-decoration: none; font-weight: 500; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    strong { color: var(--text); font-weight: 600; }
    blockquote {
      border-left: 4px solid var(--accent); background: var(--accent-light);
      padding: 14px 20px; margin: 16px 0; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic; color: var(--text-secondary); font-size: 0.95rem;
    }
    .callout {
      background: var(--accent-light); border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm); padding: 16px 20px; margin: 20px 0;
      font-size: 0.93rem; color: var(--text-secondary);
    }
    .callout-purple { background: var(--purple-light); border-left-color: var(--purple); }
    .callout-blue { background: var(--blue-light); border-left-color: var(--blue); }
    .callout-orange { background: var(--orange-light); border-left-color: var(--orange); }
    .insight-card {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 14px 18px; margin: 10px 0; border-left: 3px solid var(--accent);
    }
    .insight-card p { margin: 0; font-size: 0.92rem; }
    .framework-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px; margin: 12px 0; background: var(--surface);
    }
    .framework-card h4 { margin-top: 0; color: var(--accent); }
    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 16px 0; }
    .action-table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 0.88rem; }
    .action-table th {
      background: var(--accent); color: white; padding: 10px 14px;
      text-align: left; font-weight: 600; font-size: 0.82rem;
    }
    .action-table th:first-child { border-radius: var(--radius-xs) 0 0 0; }
    .action-table th:last-child { border-radius: 0 var(--radius-xs) 0 0; }
    .action-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .action-table tr:hover td { background: var(--surface2); }
    .priority-p0 { color: var(--red); font-weight: 700; }
    .priority-p1 { color: var(--orange); font-weight: 600; }
    .priority-p2 { color: var(--blue); font-weight: 500; }
    .discussion-q {
      background: var(--purple-light); border-radius: var(--radius-sm);
      padding: 14px 18px; margin: 10px 0; border-left: 3px solid var(--purple);
    }
    .discussion-q p { margin: 0; font-size: 0.92rem; color: var(--text); font-weight: 500; }
    .quote-block {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 16px 20px; margin: 12px 0;
    }
    .quote-block blockquote { margin: 0 0 8px; }
    .quote-source { font-size: 0.82rem; color: var(--text-muted); }
    .disclaimer {
      margin-top: 40px; padding: 16px 20px;
      background: var(--surface2); border-radius: var(--radius-sm);
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.6;
    }
    .footer {
      margin-top: 36px; padding: 20px; text-align: center;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="../index.html" class="topbar-brand">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#2d9f6f"/><path d="M8 14.5l3.5 3.5 8.5-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Tech Digest
    </a>
    <nav class="topbar-nav">
      <a href="../index.html">每日简报</a>
      <a href="index.html" class="active">Lenny 精读</a>
    </nav>
  </header>

  <details class="toc-mobile">
    <summary>目录导航</summary>
    <div class="toc-dropdown">
{{TOC_LINKS_MOBILE}}
    </div>
  </details>

  <div class="page">
    <aside class="toc">
      <div class="toc-title">目录</div>
{{TOC_LINKS}}
    </aside>
    <main class="container">
      <a class="back" href="index.html">← 返回专栏</a>
{{MAIN_CONTENT}}
      <div class="disclaimer">
        本文为基于公开访谈内容整理的中文学习笔记与方法论提炼，不替代原始节目内容。建议结合原视频完整观看。
        所有观点归原作者所有，本文仅做学习整理用途。
      </div>
      <div class="footer">
        <a href="index.html">Lenny's Podcast 深度精读</a> · Powered by <a href="https://cursor.com">Cursor AI</a>
      </div>
    </main>
  </div>

  <script>
  (function(){
    var toc = document.querySelector('.toc');
    var links = toc ? toc.querySelectorAll('a[href^="#"]') : [];
    var sections = [];
    links.forEach(function(a) {
      var id = a.getAttribute('href').slice(1);
      var el = document.getElementById(id);
      if (el) sections.push({el: el, link: a});
    });
    if (!sections.length) return;
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          links.forEach(function(l) { l.classList.remove('active'); });
          var match = sections.find(function(s) { return s.el === entry.target; });
          if (match) match.link.classList.add('active');
        }
      });
    }, {rootMargin: '-80px 0px -70% 0px'});
    sections.forEach(function(s) { observer.observe(s.el); });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日科技简报</title>
  <style>
    :root {
      --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f2f5;
      --border: #e8ecf1; --text: #1a1d21; --text-secondary: #3d4550; --text-muted: #8c95a1;
      --accent: #2d9f6f; --accent-light: #e8f5ef; --accent-hover: #248a5e;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
    }
    .topbar-brand {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .topbar-brand svg { width: 28px; height: 28px; }
    .container { max-width: 820px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }
    .issue-list { list-style: none; }
    .issue-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); margin-bottom: 14px;
      overflow: hidden; transition: all 0.2s; box-shadow: var(--shadow-sm);
    }
    .issue-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .issue-link { display: flex; align-items: stretch; text-decoration: none; color: inherit; }
    .issue-thumb {
      width: 160px; min-height: 110px; flex-shrink: 0;
      object-fit: cover; background: var(--surface2);
    }
    .issue-thumb-placeholder {
      width: 160px; min-height: 110px; flex-shrink: 0;
      background: linear-gradient(135deg, #2d9f6f 0%, #1a7a4f 50%, #0f5a38 100%);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9); font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.02em; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .issue-body {
      flex: 1; padding: 16px 20px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .issue-date {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      color: var(--accent); background: var(--accent-light);
      padding: 3px 10px; border-radius: 10px; margin-bottom: 8px; width: fit-content;
    }
    .issue-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .issue-card:hover .issue-title { color: var(--accent); }
    .issue-highlights { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
    .footer {
      margin-top: 48px; padding: 20px;
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.85rem; text-align: center;
    }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    @media (max-width: 640px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 1.5rem; }
      .issue-thumb, .issue-thumb-placeholder { width: 100px; min-height: 90px; }
      .issue-title { font-size: 0.95rem; }
      .issue-body { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="topbar-brand">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#2d9f6f"/><path d="M8 14.5l3.5 3.5 8.5-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Tech Digest
    </a>
  </header>
  <div class="container">
    <h1>每日科技简报</h1>
    <p class="subtitle">全球 50 个精选信息源 · AI 自动整理 · 中文阅读</p>
    <ul class="issue-list" id="issues"></ul>
    <div class="footer">Powered by <a href="https://cursor.com">Cursor AI</a></div>
  </div>
  <script>
  function _ph(n) {
    var d = document.createElement("div");
    d.className = "issue-thumb-placeholder";
    d.textContent = "#" + n;
    return d;
  }
  fetch("issues/index.json").then(function(r) {
    return r.json();
  }).then(function(issues) {
    var list = document.getElementById("issues");
    issues.sort(function(a, b) { return b.date.localeCompare(a.date); });
    issues.forEach(function(issue, idx) {
      var num = issues.length - idx;
      var li = document.createElement("li");
      li.className = "issue-card";
      var a = document.createElement("a");
      a.className = "issue-link";
      a.href = "issues/" + issue.date + ".html";
      if (issue.image) {
        var img = document.createElement("img");
        img.className = "issue-thumb";
        img.src = issue.image;
        img.alt = "";
        img.loading = "lazy";
        img.onerror = function() { this.replaceWith(_ph(num)); };
        a.appendChild(img);
      } else {
        a.appendChild(_ph(num));
      }
      var body = document.createElement("div");
      body.className = "issue-body";
      var ds = document.createElement("span");
      ds.className = "issue-date";
      ds.textContent = issue.date;
      var tt = document.createElement("div");
      tt.className = "issue-title";
      tt.textContent = issue.title;
      var hl = document.createElement("div");
      hl.className = "issue-highlights";
      hl.textContent = issue.highlights;
      body.appendChild(ds);
      body.appendChild(tt);
      body.appendChild(hl);
      a.appendChild(body);
      li.appendChild(a);
      list.appendChild(li);
    });
  }).catch(function() {
    document.getElementById("issues").textContent = "暂无期刊，敬请期待...";
  });
  </script>
</body>
</html>
